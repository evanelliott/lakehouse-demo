# =========================================================================
# ANCHORS & COMMON CONFIGURATION
# =========================================================================
x-airflow-common: &airflow-common
  image: pl-lakehouse:latest
  environment: &airflow-env
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - S3_ENDPOINT=http://storage-provider:9000
    - S3_BUCKET_NAME=lakehouse
    - AWS_ACCESS_KEY_ID=admin
    - AWS_SECRET_ACCESS_KEY=password123
    - ICEBERG_CATALOG_URI=http://catalog-provider:8181
    - PYARROW_IGNORE_TIMEZONE=1
  networks: [ lakehouse-airgap ]
  depends_on:
    postgres: { condition: service_healthy }

services:
  # =========================================================================
  # TIER 1: CORE DEVELOPER WORKSPACE & FAST UNIT TESTING (Always On)
  # =========================================================================
  devcontainer:
    image: pl-lakehouse:latest
    container_name: lakehouse-dev-container
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      target: development
    tty: true
    stdin_open: true
    volumes:
      - .:/app:cached
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lakehouse-airgap

  # =========================================================================
  # TIER 2: EPHEMERAL STATEFUL INFRASTRUCTURE (Profile: test)
  # =========================================================================
  minio:
    image: minio/minio:latest
    container_name: lakehouse_minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /data # Wipes entirely on down commands to keep tests completely stateless
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 2s # Aggressive health checks to minimize pre-push hook spin-up latency
      timeout: 2s
      retries: 5
    networks:
      lakehouse-airgap:
        aliases: [ storage-provider ]
    profiles: [ test, live ]
    deploy:
      resources:
        limits:
          memory: 1g

  iceberg-catalog:
    image: apache/iceberg-rest-fixture:latest
    container_name: lakehouse_catalog
    ports:
      - "8181:8181"
    environment:
      - CATALOG_WAREHOUSE=s3a://lakehouse/warehouse/
      - CATALOG_S3_ENDPOINT=http://storage-provider:9000
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password123
    depends_on:
      minio: { condition: service_healthy }
    networks:
      lakehouse-airgap:
        aliases: [ catalog-provider ]
    profiles: [ test, live ]
    deploy:
      resources:
        limits:
          memory: 512m

  integration-tester:
    <<: *airflow-common
    container_name: lakehouse_pre_push_runner
    volumes: []
    command: pytest -m integration
    profiles: [ test ]

  # =========================================================================
  # TIER 3: PRODUCTION STACK SIMULATION (Profile: live)
  # =========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: lakehouse_db
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - /var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 5s
    networks: [ lakehouse-airgap ]
    profiles: [ live ]
    deploy:
      resources:
        limits:
          memory: 1g

  airflow-all-in-one:
    <<: *airflow-common
    container_name: lakehouse_airflow
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      target: runtime # Swaps directly to lean production stage (removes pytest/ruff/mypy)
    command: >
      bash -c "airflow db init &&  airflow users create 
        --username admin 
        --password admin 
        --firstname Data 
        --lastname Engineer 
        --role Admin 
        --email engineer@example.com && 
      (airflow scheduler & airflow webserver)"
    ports: [ "8080:8080" ]
    volumes:
      - ./src:/app/src
    networks:
      - lakehouse-airgap
      - lakehouse-live
    profiles: [ live ]
    deploy:
      resources:
        limits:
          memory: 5g # Capped to safeguard your 16GB RAM constraint

# =========================================================================
# NETWORKING REGISTRY
# =========================================================================
networks:
  lakehouse-airgap:
    internal: true # Total sandbox isolation for development hooks
  lakehouse-live:
    driver: bridge # Allocated for live web-scraping components
