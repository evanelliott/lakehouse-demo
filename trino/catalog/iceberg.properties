# =================================================================
# CORE CONNECTOR CONFIG
# =================================================================
connector.name=iceberg
iceberg.catalog.type=rest

# =================================================================
# CATALOG CONNECTION (DYNAMIC)
# =================================================================
iceberg.rest-catalog.uri=http://${ENV:CATALOG_HOST}:${ENV:CATALOG_INTERNAL_PORT}

# =================================================================
# STORAGE (MINIO/S3) CONFIG (DYNAMIC)
# =================================================================
fs.native-s3.enabled=true
s3.endpoint=http://${ENV:MINIO_HOST}:${ENV:MINIO_INTERNAL_PORT}
s3.path-style-access=true
s3.region=${ENV:AWS_REGION}

# Credentials injected from .env via Docker Compose
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
