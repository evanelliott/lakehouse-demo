        which is a statistical measure of the quality of chances created and conceded.\n\t\t</p>\n\t\t<p>\n\t\t\tOur
        goal was to create the most precise method for shot quality evaluation.\n\t\t</p>\n\t\t<p>\n\t\t\tFor
